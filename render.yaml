services:
  - type: web
    name: agenda-vocale-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false  # Da configurare su Render.com
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://agenda-vocale-frontend.onrender.com  # Aggiornare dopo deploy frontend
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    healthCheckPath: /api/health
