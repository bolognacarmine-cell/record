services:
  - type: web
    name: agenda-vocale-frontend
    runtime: static
    plan: free
    buildCommand: npm install && npm run generate
    staticPublishPath: .output/public
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NUXT_PUBLIC_API_BASE
        value: https://agenda-vocale-backend.onrender.com
